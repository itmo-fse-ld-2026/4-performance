services:
  database:
    image: "postgres:18.0-alpine3.22"
    container_name: ${POSTGRES_HOST}
    command: postgres -c 'config_file=/etc/postgresql/postgresql.conf'
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_PORT
    volumes:
      - ./postgresql_db_data:/var/lib/postgresql/18/data
      - ./src/main/resources/postgres/postgres.compiled.conf:/etc/postgresql/postgresql.conf
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -p $${POSTGRES_PORT}"]
      interval: 5s
      timeout: 5s
      retries: 5
  wildfly:
    image: ghcr.io/itmo-fse-ld-2026/${IMAGE_WEB}:${VERSION_TAG}
    environment:
      - POSTGRES_HOST
      - POSTGRES_DB
      - POSTGRES_PORT
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - JAVA_OPTS=${JAVA_OPTS-}
      - JAVA_HOME=${JAVA_HOME-}
      - IMAGE_WEB=${IMAGE_WEB}
    volumes:
      - ./src/main/resources/wildfly/standalone.compiled.xml:/opt/jboss/wildfly/standalone/configuration/standalone.xml
      - ./src/main/resources/wildfly/standalone.compiled.conf:/opt/jboss/wildfly/bin/standalone.conf
      - ./target:/opt/jboss/wildfly/standalone/deployments/
    networks:
      - backend
    ports:
      - "8080:8080"
      - "9990:9990"
      - "9010:9010"
    command: ["/opt/jboss/wildfly/bin/standalone.sh", "-b", "0.0.0.0", "-bmanagement", "0.0.0.0"]
    depends_on:
      database:
        condition: service_healthy

networks:
  backend: {}