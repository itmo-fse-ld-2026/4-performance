<!DOCTYPE html>
<html lang="#{localeBean.language}"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
>
<f:view locale="#{localeBean.locale}">
    <h:head>
        <title>#{msg['page.index.title']}</title>
        <h:outputStylesheet library="css" name="styles.css" />
        <h:outputScript library="js" name="clock.js" target="body" />
    </h:head>
    <h:body>
        <header>
            <div class="header-left">
                <h1>#{msg['page.header.students']}</h1>
            </div>
            <div class="header-right">
                <h:form id="localeForm" styleClass="locale-form">
                    <h:selectOneMenu value="#{localeBean.language}" styleClass="locale-select">
                        <f:selectItem itemValue="ru" itemLabel="RU"/>
                        <f:selectItem itemValue="en" itemLabel="EN"/>
                        <f:ajax event="change" listener="#{localeBean.applyLocale}" render="@all"/>
                    </h:selectOneMenu>
                </h:form>
                <div id="clock"></div>
            </div>
        </header>
        <main class="index-main">
            <div class="card" style="text-align: center">
                <h2>#{msg['page.index.prompt']}</h2>
                <h:link outcome="main" value="#{msg['page.index.link.main']}" styleClass="btn-link" />
            </div>
        </main>
    </h:body>
</f:view>
</html>
